<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | VIP Ad‑Free Live Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Urbanist',sans-serif; background:#020617; color:#fff; overflow:hidden; height:100vh; width:100vw; }
        h1,h2,h3 { font-family:'Syne',sans-serif; }
        .liquid-mesh { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-3; background:radial-gradient(circle at 20% 30%, #020617, #1e3a8a 30%, #3b82f6 65%, #4f46e5); background-size:200% 200%; animation:liquidShift 20s ease infinite alternate; }
        @keyframes liquidShift { 0% { background-position:0% 0%; } 100% { background-position:100% 100%; } }
        .glass-card { background:rgba(20,30,55,0.45); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.15); border-radius:24px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); }
        .tv-layout { display:flex; width:100%; height:100%; padding:30px; gap:30px; }
        .sidebar { width:20%; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:30px 20px; text-align:center; flex-shrink:0; transition:width 0.3s, padding 0.3s, visibility 0.2s; }
        .sidebar.collapsed { width:0; padding:0; overflow:hidden; visibility:hidden; }
        .main-content { flex:1; display:flex; flex-direction:column; gap:30px; }
        .logo-text { font-weight:800; font-size:1.8rem; background:linear-gradient(135deg,#fde047,#f59e0b); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:10px; }
        .event-info h2 { font-size:1.8rem; line-height:1.1; }
        .qr-container { background:white; padding:12px; border-radius:20px; margin:20px 0; }
        .qr-container img { width:100%; max-width:180px; display:block; }
        .photo-stage { flex:1; position:relative; border-radius:24px; overflow:hidden; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4); }
        .photo-layer { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity 1.2s ease-in-out; }
        .photo-layer.active { opacity:1; }
        .bottom-ad-bar { height:120px; width:100%; display:flex; align-items:center; padding:0 30px; gap:20px; }
        .ad-badge-mini { background:linear-gradient(105deg,#fbbf24,#f59e0b); color:#020617; padding:4px 12px; border-radius:50px; font-weight:900; font-size:0.75rem; }
        .ad-banner-img { height:80px; width:150px; border-radius:12px; object-fit:cover; }
        .ad-takeover { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,6,23,0.98); backdrop-filter:blur(30px); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.8s ease; }
        .ad-takeover.show { opacity:1; pointer-events:auto; }
        .ad-timer-container { position:absolute; top:40px; right:40px; display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.1); padding:8px 20px; border-radius:50px; border:1px solid rgba(255,255,255,0.2); font-family:'Syne',sans-serif; font-weight:700; }
        .ad-timer-circle { width:32px; height:32px; border-radius:50%; background:#fbbf24; color:#020617; display:flex; align-items:center; justify-content:center; font-weight:800; }
        .takeover-badge { background:linear-gradient(105deg,#fbbf24,#f59e0b); color:#020617; padding:10px 30px; border-radius:50px; font-weight:900; font-size:1.4rem; margin-bottom:40px; }
        .takeover-img { width:70%; max-height:60%; border-radius:32px; object-fit:cover; border:2px solid rgba(251,191,36,0.3); }
        .watermark { position:absolute; bottom:20px; right:25px; font-family:'Syne'; font-weight:800; font-size:1.2rem; color:rgba(255,255,255,0.3); z-index:10; }
        .control-buttons { position:fixed; bottom:30px; right:30px; display:flex; gap:16px; z-index:200; }
        .ctrl-btn { background:rgba(20,30,55,0.8); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.25); border-radius:60px; padding:12px 20px; font-weight:800; font-size:0.9rem; color:#fde047; cursor:pointer; transition:0.2s; display:flex; align-items:center; gap:8px; font-family:'Urbanist',sans-serif; }
        .ctrl-btn:hover { background:rgba(251,191,36,0.3); transform:translateY(-2px); }
        .ctrl-btn:active { transform:scale(0.96); }
        .ended-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center; z-index:20; flex-direction:column; text-align:center; color:#f87171; }
    </style>
</head>
<body>
    <div class="liquid-mesh"></div>
    <div class="tv-layout">
        <div class="sidebar glass-card" id="sidebar"><div><div class="logo-text">SnapNexus</div><div class="event-info"><h2 id="displayEventId">Guest Wall</h2><p><i data-lucide="radio"></i> VIP Tier · No Ads</p></div></div><div><div class="qr-container"><img id="qrCode"></div><div style="font-weight:800;">Scan to Join</div></div></div>
        <div class="main-content"><div class="photo-stage glass-card" id="photoStage"><img id="layer1" class="photo-layer active"><img id="layer2" class="photo-layer"><div class="watermark">SnapNexus</div></div><div class="bottom-ad-bar glass-card" id="adBar"><div class="ad-badge-mini">SPONSORED</div><img class="ad-banner-img" src="https://images.unsplash.com/photo-1551316679-9c6ae9dec224?auto=format&fit=crop&w=400&q=80"><div><h3>Upgrade to VIP</h3><p style="color:#94a3b8;">Remove ads and unlock Fullscreen Mode today.</p></div></div></div>
    </div>
    <div id="adTakeover" class="ad-takeover"><div class="ad-timer-container"><span>RESUMING IN</span><div class="ad-timer-circle" id="adTimer">5</div></div><div class="takeover-badge">SPONSOR AD</div><img class="takeover-img" src="https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?auto=format&fit=crop&w=1200&q=80"><h2 style="margin-top:30px;font-size:2.5rem;">SnapNexus Pro</h2></div>
    <div class="control-buttons"><div class="ctrl-btn" id="collapseSidebarBtn"><span>◀</span> Collapse Sidebar</div><div class="ctrl-btn" id="fullscreenBtn"><span>⛶</span> Fullscreen</div></div>
    <script>
        lucide.createIcons(); document.getElementById('adBar').style.display='none';
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event') || 'TEST';
        document.getElementById('displayEventId').innerText = `Event: ${eventId}`;
        const joinLink = `${window.location.origin}/app.html?event=${eventId}`;
        document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(joinLink)}`;

        const { Client, Storage, Databases, Query } = Appwrite;
        const PROJ_ID = '69d8eda100264f4e42ae';
        const BKT_ID = '69d8f2b800397ad57e50';
        const DB_ID = '69d8f0b0003c6d1e4d93';
        const COLLECTION_ID = '69d8f0b0003c6d1e4d93';
        const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject(PROJ_ID);
        const storage = new Storage(client);
        const databases = new Databases(client);

        let photoUrls = [];
        let currentIndex = 0, activeLayer = 1;
        const layer1 = document.getElementById('layer1'), layer2 = document.getElementById('layer2');
        let slideshowInterval = null;
        let eventActive = true;

        async function checkEventStatus() {
            try {
                const res = await databases.listDocuments(DB_ID, COLLECTION_ID, [Query.equal('eventId', eventId)]);
                if (res.documents.length === 0) { eventActive = false; showEndedOverlay(); return; }
                eventActive = res.documents[0].status !== 'ended';
                if (!eventActive) showEndedOverlay();
            } catch(err) { eventActive = false; showEndedOverlay(); }
        }

        function showEndedOverlay() {
            if (document.getElementById('endedOverlay')) return;
            const stage = document.getElementById('photoStage');
            const overlay = document.createElement('div'); overlay.id = 'endedOverlay'; overlay.className = 'ended-overlay';
            overlay.innerHTML = `<i data-lucide="flag" style="width:64px;height:64px;margin-bottom:20px;"></i><h2>Event Concluded</h2><p>This live wall has ended. Thank you for being part of the experience.</p>`;
            stage.appendChild(overlay); lucide.createIcons();
            if (slideshowInterval) clearInterval(slideshowInterval);
        }

        async function fetchPhotos() {
            if (!eventActive) return;
            try {
                const prefix = eventId + '_';
                const files = (await storage.listFiles(BKT_ID, { prefix })).files || [];
                photoUrls = files.map(f => storage.getFileView(BKT_ID, f.$id));
                if (photoUrls.length && currentIndex===0) { const firstUrl = photoUrls[0]; if (activeLayer===1) { layer1.src = firstUrl; layer1.classList.add('active'); } else { layer2.src = firstUrl; layer2.classList.add('active'); } }
            } catch(err) { console.error(err); }
        }

        client.subscribe(`buckets.${BKT_ID}.files`, response => {
            if (eventActive && response.events.includes('buckets.*.files.*.create')) {
                const newFile = response.payload;
                if (newFile.$id.startsWith(eventId + '_')) { photoUrls.push(storage.getFileView(BKT_ID, newFile.$id)); }
            }
        });

        function nextSlide() {
            if (!eventActive || photoUrls.length===0) return;
            currentIndex = (currentIndex+1) % photoUrls.length;
            const nextUrl = photoUrls[currentIndex];
            if (activeLayer===1) { layer2.src = nextUrl; layer2.classList.add('active'); layer1.classList.remove('active'); activeLayer=2; }
            else { layer1.src = nextUrl; layer1.classList.add('active'); layer2.classList.remove('active'); activeLayer=1; }
        }

        const sidebar = document.getElementById('sidebar');
        document.getElementById('collapseSidebarBtn').addEventListener('click', () => { sidebar.classList.toggle('collapsed'); });
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        function toggleFullscreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); fullscreenBtn.innerHTML='<span>✖</span> Exit'; } else { document.exitFullscreen(); fullscreenBtn.innerHTML='<span>⛶</span> Fullscreen'; } }
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('fullscreenchange', () => { fullscreenBtn.innerHTML = document.fullscreenElement ? '<span>✖</span> Exit' : '<span>⛶</span> Fullscreen'; });

        async function init() { await checkEventStatus(); if (eventActive) { await fetchPhotos(); slideshowInterval = setInterval(nextSlide, 4000); } }
        init();
    </script>
</body>
</html>
