<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | Live Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script src="config.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Urbanist',sans-serif; background:#020617; color:#ffffff; overflow:hidden; height:100vh; width:100vw; }
        h1,h2,h3 { font-family:'Syne',sans-serif; }
        .liquid-mesh { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-3; background:radial-gradient(circle at 20% 30%, #020617, #1e3a8a 30%, #3b82f6 65%, #4f46e5); background-size:200% 200%; animation:liquidShift 20s ease infinite alternate; }
        @keyframes liquidShift { 0% { background-position:0% 0%; } 100% { background-position:100% 100%; } }
        .glass-card { background:rgba(20,30,55,0.45); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.15); border-radius:24px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); }
        .tv-layout { display:flex; width:100%; height:100%; padding:30px; gap:30px; }
        .sidebar { width:20%; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:30px 20px; text-align:center; flex-shrink:0; }
        .main-content { flex:1; display:flex; flex-direction:column; gap:30px; }
        .logo-text { font-weight:800; font-size:1.8rem; background:linear-gradient(135deg,#fde047,#f59e0b); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:10px; }
        .event-info h2 { font-size:1.8rem; line-height:1.1; }
        .qr-container { background:white; padding:12px; border-radius:20px; margin:20px 0; }
        .qr-container img { width:100%; max-width:180px; display:block; }
        .photo-stage { flex:1; position:relative; border-radius:24px; overflow:hidden; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4); }
        .photo-layer { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity 1.2s ease-in-out; }
        .photo-layer.active { opacity:1; }
        .bottom-ad-bar { height:120px; width:100%; display:flex; align-items:center; padding:0 30px; gap:20px; }
        .ad-badge-mini { background:linear-gradient(105deg,#fbbf24,#f59e0b); color:#020617; padding:4px 12px; border-radius:50px; font-weight:900; font-size:0.75rem; }
        .ad-banner-img { height:80px; width:150px; border-radius:12px; object-fit:cover; }
        .watermark { position:absolute; bottom:20px; right:25px; font-family:'Syne'; font-weight:800; font-size:1.2rem; color:rgba(255,255,255,0.3); z-index:10; }
        .ended-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center; z-index:20; flex-direction:column; text-align:center; color:#f87171; }
    </style>
</head>
<body>
    <div class="liquid-mesh"></div>
    <div class="tv-layout">
        <div class="sidebar glass-card">
            <div><div class="logo-text">SnapNexus</div><div class="event-info"><h2 id="displayEventId">Guest Wall</h2><p><i data-lucide="radio" style="width:16px;"></i> Free Tier</p></div></div>
            <div><div class="qr-container"><img id="qrCode"></div><div style="font-weight:800;">Scan to Join</div></div>
        </div>
        <div class="main-content">
            <div class="photo-stage glass-card" id="photoStage">
                <img id="layer1" class="photo-layer active" src="">
                <img id="layer2" class="photo-layer" src="">
                <div class="watermark">SnapNexus</div>
            </div>
            <div class="bottom-ad-bar glass-card">
                <div class="ad-badge-mini">SPONSORED</div>
                <img class="ad-banner-img" src="https://images.unsplash.com/photo-1551316679-9c6ae9dec224?auto=format&fit=crop&w=400&q=80">
                <div><h3>Upgrade to VIP</h3><p style="color:#94a3b8;">Remove ads and unlock Fullscreen Mode today.</p></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            lucide.createIcons();
            const cfg = window.SnapNexus;
            if (!cfg) { console.error('Config not loaded'); return; }
            
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('event') || 'demo';
            document.getElementById('displayEventId').innerHTML = `Event: ${eventId}`;
            const joinLink = cfg.resolveUrl(`app.html?event=${eventId}`);
            document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(joinLink)}`;
            
            const client = new Appwrite.Client()
                .setEndpoint(cfg.ENDPOINT)
                .setProject(cfg.PROJECT_ID);
            const storage = new Appwrite.Storage(client);
            const databases = new Appwrite.Databases(client);
            
            let photos = [];
            let currentIndex = 0;
            let activeLayer = 1;
            let slideshowInterval = null;
            let eventActive = true;
            const layer1 = document.getElementById('layer1');
            const layer2 = document.getElementById('layer2');
            
            cfg.log('TV.html loaded, eventId:', eventId);
            
            async function checkEventStatus() {
                try {
                    const res = await databases.listDocuments(cfg.DATABASE_ID, cfg.COLLECTION_ID, [
                        Appwrite.Query.equal('eventId', eventId)
                    ]);
                    if (res.documents.length === 0) return;
                    eventActive = res.documents[0].status !== 'ended';
                    if (!eventActive) showEndedOverlay();
                } catch(err) { cfg.error('Status check:', err); }
            }
            
            function showEndedOverlay() {
                if (document.getElementById('endedOverlay')) return;
                const stage = document.getElementById('photoStage');
                const overlay = document.createElement('div');
                overlay.id = 'endedOverlay';
                overlay.className = 'ended-overlay';
                overlay.innerHTML = `<i data-lucide="flag" style="width:64px;height:64px;margin-bottom:20px;"></i><h2>Event Concluded</h2><p>This live wall has ended. Thank you.</p>`;
                stage.appendChild(overlay);
                lucide.createIcons();
                if (slideshowInterval) clearInterval(slideshowInterval);
            }
            
            async function fetchPhotos() {
                if (!eventActive) return;
                try {
                    const result = await storage.listFiles(cfg.BUCKET_ID);
                    const files = result.files || [];
                    const newUrls = files.map(f => storage.getFileView(cfg.BUCKET_ID, f.$id));
                    if (JSON.stringify(newUrls) !== JSON.stringify(photos)) {
                        cfg.log('TV: Photos updated, count:', newUrls.length);
                        photos = newUrls;
                        if (photos.length > 0 && currentIndex === 0) {
                            if (activeLayer === 1) {
                                layer1.src = photos[0];
                                layer1.classList.add('active');
                            } else {
                                layer2.src = photos[0];
                                layer2.classList.add('active');
                            }
                        }
                    }
                } catch(err) { cfg.error('TV fetch error:', err); }
            }
            
            function nextSlide() {
                if (!eventActive || photos.length === 0) return;
                currentIndex = (currentIndex + 1) % photos.length;
                const nextUrl = photos[currentIndex];
                if (activeLayer === 1) {
                    layer2.src = nextUrl;
                    layer2.classList.add('active');
                    layer1.classList.remove('active');
                    activeLayer = 2;
                } else {
                    layer1.src = nextUrl;
                    layer1.classList.add('active');
                    layer2.classList.remove('active');
                    activeLayer = 1;
                }
            }
            
            checkEventStatus();
            fetchPhotos();
            setInterval(fetchPhotos, 5000);
            slideshowInterval = setInterval(nextSlide, 6000);
        })();
    </script>
</body>
</html>
