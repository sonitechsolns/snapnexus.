<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SnapNexus | Guest Upload</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta property="og:image" content="https://snapnexus.in/SNAPN.png">
    <link rel="preload" as="image" href="/SNAPN.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Urbanist',sans-serif; background:#020617; color:#fff; overflow-x:hidden; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        h1,h2,h3 { font-family:'Syne',sans-serif; }
        .liquid-mesh { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-3; background:radial-gradient(circle at 20% 30%, #020617, #1e3a8a 30%, #3b82f6 65%, #4f46e5); background-size:200% 200%; animation:liquidShift 16s ease infinite alternate; }
        @keyframes liquidShift { 0% { background-position:0% 0%; } 50% { background-position:100% 100%; } 100% { background-position:0% 50%; } }
        .noise-overlay { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-2; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E"); opacity:0.4; }
        .glass-card { background:rgba(20,30,55,0.45); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.2); border-radius:32px; padding:40px 24px; width:100%; max-width:480px; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,0.3); }
        .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; background:linear-gradient(135deg,#ffffff,#93c5fd); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:8px; }
        .event-pill { display:inline-flex; align-items:center; gap:6px; background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); color:#93c5fd; padding:6px 16px; border-radius:50px; font-size:0.85rem; font-weight:700; margin-bottom:32px; }
        .btn-physics { display:flex; align-items:center; justify-content:center; gap:12px; padding:18px 24px; font-weight:800; font-size:1.1rem; font-family:'Urbanist',sans-serif; border-radius:60px; border:none; cursor:pointer; transition:transform 0.1s; background:linear-gradient(105deg,#3b82f6,#4f46e5); color:white; box-shadow:0 8px 20px rgba(59,130,246,0.3); width:100%; }
        .btn-physics:active { transform:scale(0.96) translateY(2px); }
        .btn-physics:disabled { opacity:0.6; cursor:not-allowed; }
        .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px,1fr)); gap:12px; margin-top:32px; }
        .gallery-item { position:relative; aspect-ratio:1; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); }
        .gallery-item img { width:100%; height:100%; object-fit:cover; transition:0.2s; }
        .download-overlay { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:8px; opacity:0; transition:opacity 0.2s; cursor:pointer; }
        .gallery-item:hover .download-overlay { opacity:1; }
        .download-overlay i { color:#60a5fa; width:20px; height:20px; }
        .empty-gallery { text-align:center; padding:40px 20px; color:#94a3b8; font-weight:600; }
        .footer-text { margin-top:30px; font-size:0.8rem; color:#64748b; font-weight:600; text-align:center; }
        .ended-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(20px); display:flex; align-items:center; justify-content:center; z-index:1000; flex-direction:column; text-align:center; }
        .spinner { display:inline-block; width:20px; height:20px; border:2px solid rgba(255,255,255,0.3); border-radius:50%; border-top-color:white; animation:spin 0.8s linear infinite; margin-right:8px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading-state { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; font-family:'Syne'; }
    </style>
</head>
<body>
    <div class="liquid-mesh"></div>
    <div class="noise-overlay"></div>
    <div class="glass-card" data-aos="zoom-in" data-aos-duration="800" id="mainCard">
        <div class="logo-text">SnapNexus</div>
        <div class="event-pill" data-aos="fade-down" data-aos-delay="200"><i data-lucide="party-popper" style="width:14px;"></i> <span id="eventLabel">Loading...</span></div>
        <div id="uploadUI">
            <button class="btn-physics" id="uploadBtn"><i data-lucide="camera" style="width:22px;"></i> Tap to Upload</button>
            <input type="file" id="fileInput" hidden accept="image/*">
            <p style="margin-top: 16px; font-size: 0.9rem; color: #94a3b8;" id="statusMsg">Ready</p>
        </div>
        <div id="galleryContainer" class="gallery-grid" data-aos="fade-up" data-aos-delay="600">
            <div class="empty-gallery">Loading gallery...</div>
        </div>
    </div>
    <div class="footer-text" data-aos="fade-up" data-aos-delay="800">Powered by SnapNexus</div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // [DEEPSEEK PATCH] Global declarations – ONCE
        lucide.createIcons();
        AOS.init({ once: true });
        
        const cfg = window.SnapNexus;
        if (!cfg) {
            console.error('Config not loaded');
            throw new Error('Missing config.js');
        }
        
        const client = new Appwrite.Client()
            .setEndpoint(cfg.ENDPOINT)
            .setProject(cfg.PROJECT_ID);
        const storage = new Appwrite.Storage(client);
        const databases = new Appwrite.Databases(client);
        
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event') || 'demo';
        document.getElementById('eventLabel').innerText = eventId;
        let eventActive = true;
        let isUploading = false;
        let statusCheckDone = false;
        
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const statusMsg = document.getElementById('statusMsg');
        const originalBtnHTML = uploadBtn.innerHTML;
        
        function showLoading(message) {
            let loader = document.getElementById('appLoader');
            if (!loader) {
                loader = document.createElement('div');
                loader.id = 'appLoader';
                loader.className = 'loading-state';
                loader.innerHTML = `<div class="spinner"></div><div>${message}</div>`;
                document.body.appendChild(loader);
            } else {
                loader.querySelector('div:last-child').innerText = message;
                loader.style.display = 'flex';
            }
        }
        function hideLoading() {
            const loader = document.getElementById('appLoader');
            if (loader) loader.style.display = 'none';
        }
        
        // [DEEPSEEK PATCH] checkEventStatus: defaults to active unless DB says 'ended'
        async function checkEventStatus() {
            showLoading('Checking event status...');
            try {
                const res = await databases.listDocuments(cfg.DATABASE_ID, cfg.COLLECTION_ID, [
                    Appwrite.Query.equal('eventId', eventId)
                ]);
                if (res.documents.length === 0) {
                    console.error('Event not found, assuming active');
                    eventActive = true;
                } else {
                    const eventDoc = res.documents[0];
                    console.log('DB Status (app):', eventDoc.status);
                    eventActive = eventDoc.status !== 'ended';
                }
                if (!eventActive) {
                    showEndedOverlay();
                }
            } catch(err) {
                console.error('Status check failed:', err);
                eventActive = true; // safe fallback
            } finally {
                statusCheckDone = true;
                hideLoading();
            }
        }
        
        function showEndedOverlay() {
            if (document.getElementById('endedOverlay')) return;
            const overlay = document.createElement('div');
            overlay.id = 'endedOverlay';
            overlay.className = 'ended-overlay';
            overlay.innerHTML = `<i data-lucide="flag" style="width:64px;height:64px;margin-bottom:20px;"></i><h2 style="color:#f87171;">Event Concluded</h2><p>This photo wall has ended. Thank you.</p>`;
            document.body.appendChild(overlay);
            lucide.createIcons();
            uploadBtn.disabled = true;
            fileInput.disabled = true;
        }
        
        // [DEEPSEEK PATCH] Appwrite v14 storage list using Query.startsWith on 'name'
        async function loadGallery() {
            if (!eventActive || !statusCheckDone) return;
            try {
                const result = await storage.listFiles(cfg.BUCKET_ID, [
                    Appwrite.Query.startsWith('name', eventId + '_'),
                    Appwrite.Query.limit(100),
                    Appwrite.Query.orderDesc('$createdAt')
                ]);
                const files = result.files || [];
                const container = document.getElementById('galleryContainer');
                if (files.length === 0) {
                    container.innerHTML = `<div class="empty-gallery"><i data-lucide="camera-off"></i><p>No photos yet. Be the first to share!</p></div>`;
                    lucide.createIcons();
                    return;
                }
                let html = '';
                for (const file of files) {
                    const viewUrl = storage.getFileView(cfg.BUCKET_ID, file.$id);
                    html += `
                        <div class="gallery-item" data-file-id="${file.$id}">
                            <img src="${viewUrl}" loading="lazy">
                            <div class="download-overlay" data-file-id="${file.$id}"><i data-lucide="download"></i></div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                lucide.createIcons();
                document.querySelectorAll('.download-overlay').forEach(el => {
                    el.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const fileId = el.getAttribute('data-file-id');
                        try {
                            const downloadUrl = storage.getFileDownload(cfg.BUCKET_ID, fileId);
                            const a = document.createElement('a');
                            a.href = downloadUrl;
                            a.download = '';
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                        } catch(err) { alert('Download failed'); }
                    });
                });
            } catch(err) { console.error(err); }
        }
        
        // [DEEPSEEK PATCH] Upload: rename file to start with eventId + '_' + timestamp + original name, then use Appwrite.ID.unique()
        uploadBtn.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', async (e) => {
            if (!eventActive) { alert('This event has ended.'); fileInput.value = ''; return; }
            if (isUploading) { alert('Please wait, upload in progress'); return; }
            const originalFile = e.target.files[0];
            if (!originalFile) return;
            
            isUploading = true;
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner"></span> Uploading...';
            statusMsg.innerText = 'Preparing photo...';
            lucide.createIcons();
            
            // [DEEPSEEK PATCH] Rename file to embed eventId + timestamp + original name
            const timestamp = Date.now();
            const newName = `${eventId}_${timestamp}_${originalFile.name}`;
            const safeFile = new File([originalFile], newName, { type: originalFile.type });
            
            const fileId = Appwrite.ID.unique();
            
            try {
                await storage.createFile(cfg.BUCKET_ID, fileId, safeFile);
                uploadBtn.innerHTML = '<i data-lucide="check"></i> Sent to TV!';
                statusMsg.innerText = 'Photo sent to TV wall!';
                lucide.createIcons();
                loadGallery();
                setTimeout(() => {
                    uploadBtn.innerHTML = originalBtnHTML;
                    statusMsg.innerText = 'Ready';
                    lucide.createIcons();
                    isUploading = false;
                    uploadBtn.disabled = false;
                }, 3000);
            } catch(err) {
                console.error(err);
                alert("Upload failed: " + err.message);
                uploadBtn.innerHTML = originalBtnHTML;
                statusMsg.innerText = 'Upload failed, try again';
                lucide.createIcons();
                isUploading = false;
                uploadBtn.disabled = false;
            }
            fileInput.value = '';
        });
        
        (async function init() {
            await checkEventStatus();
            if (eventActive) {
                await loadGallery();
                setInterval(loadGallery, 10000);
            }
        })();
    </script>
</body>
</html>
